name: 02 Build and Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./docker/Dockerfile
          push: false
          tags: devops-full-stack-aws:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verificar imagem gerada
        run: docker images | grep devops-full-stack-aws || echo "Imagem buildada via buildx (sem export local)"

  validate-terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: ./terraform
        continue-on-error: true

      - name: Terraform Init (local)
        run: terraform init -backend=false
        working-directory: ./terraform/environments/dev

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./terraform/environments/dev

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build, validate-terraform]

    steps:
      - name: Resumo do build
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | sucesso |" >> $GITHUB_STEP_SUMMARY
          echo "| Terraform Validate | sucesso |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Push para ECR desabilitado — requer secrets AWS configurados." >> $GITHUB_STEP_SUMMARY
